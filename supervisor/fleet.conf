# fleet.conf — declare all agents for this engagement
#
# Format: <agent-name>  <role-file>  [model]
# - agent-name: must match the ~/agents/<agent-name>/config file on each machine
# - role-file:  filename inside the control repo's roles/ directory
# - model:      optional, defaults to claude-sonnet-4-6
#
# Lines starting with # are comments. Blank lines are ignored.
# Edit this file to add or remove agents from the fleet.

agent-be    FEATURE_ROLE.md    claude-sonnet-4-6
agent-fe    FEATURE_ROLE.md    claude-sonnet-4-6
agent-qa    QA_ROLE.md         claude-sonnet-4-6
agent-doc   DOC_ROLE.md        claude-sonnet-4-6
